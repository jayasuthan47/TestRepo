<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }

    .card h1 {
      font-size: 1.5rem;
      margin-bottom: .25rem;
    }

    .card p.subtitle {
      font-size: .875rem;
      color: #888;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      margin-bottom: .35rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: .65rem .75rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: .9rem;
      margin-bottom: 1rem;
      transition: border-color .2s;
    }

    input:focus {
      outline: none;
      border-color: #4f46e5;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .8125rem;
      margin-bottom: 1.25rem;
    }

    .row label { margin-bottom: 0; font-weight: 400; }

    .row a {
      color: #4f46e5;
      text-decoration: none;
    }

    button {
      width: 100%;
      padding: .7rem;
      background: #4f46e5;
      color: #fff;
      font-size: .95rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s;
    }

    button:hover { background: #4338ca; }

    .footer {
      text-align: center;
      font-size: .8125rem;
      margin-top: 1.25rem;
      color: #888;
    }

    .footer a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account</p>

    <form>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required />

      <div class="row">
        <label><input type="checkbox" /> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit">Sign in</button>
    </form>

    <p class="footer">Don't have an account? <a href="#">Sign up</a></p>
  </div>
</body>
</html>
